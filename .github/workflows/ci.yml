name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Sprout.slnx

      - name: Build
        run: dotnet build Sprout.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Sprout.slnx --no-build --configuration Release --verbosity normal

  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/sprout-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/sprout-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

  package:
    name: Build & Release Docker Package
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/sprout-web/package-lock.json

      - name: Build Frontend
        working-directory: frontend/sprout-web
        run: npm ci && npm run build

      - name: Copy Frontend to Backend wwwroot
        run: cp -r frontend/sprout-web/dist backend/Sprout.Api/wwwroot

      - name: Build Backend Release
        run: dotnet publish backend/Sprout.Api -c Release -o backend-build

      - name: Create Release Artifacts
        run: |
          mkdir -p release-artifacts
          cd backend-build
          zip -r ../release-artifacts/sprout-backend.zip .
          cd ../
          zip -r release-artifacts/sprout-frontend.zip frontend/sprout-web/dist

      - name: Get Version
        id: version
        run: |
          VERSION=$(date +'%Y.%m.%d')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-artifacts/*
          tag_name: v${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
